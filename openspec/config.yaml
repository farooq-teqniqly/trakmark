schema: spec-driven

context: |
  Tech stack: .NET 10, C#, Blazor Web App (Interactive Server, per-page), EF Core + SQL Server, ASP.NET Core Identity (Google OAuth).
  Project naming: one project per layer/concern, prefixed `Trakmark.<Area>` (e.g. Trakmark.Domain); the web app project is `Trakmark`.
  Tests: each project's unit tests live in a sibling project `<Project>.Tests` (e.g. Trakmark.Domain.Tests) using xUnit (NSubstitute for mocking), referencing the project under test.
  Test style: one test class per production type, one file per test class — never group multiple unrelated types in a single test file. Each test has // Arrange, // Act, // Assert comments; when all phases collapse to a single expression or lambda (e.g. Assert.Throws<>(...) or a one-liner assertion on an [InlineData]-driven value), combine them as // Arrange / Act / Assert or // Act / Assert on a single line — do not artificially split; never annotate AAA markers with inline notes (e.g. // Assert — some explanation), use the plain marker only. Prefer data-driven tests (Theory/InlineData/MemberData) over many near-duplicate Facts; once a Theory covers a case do not also write a Fact for the same scenario — it is redundant and will diverge; test behavior not implementation (assert observable outcomes, not internal calls) so tests aren't brittle. Integration/end-to-end tests prefer the real database via Testcontainers over in-memory fakes.
  TDD: each `#### Scenario:` in a spec maps to a test case; write the failing tests from a spec's scenarios first, then implement to green. For test-only changes (adding tests against already-complete production code), satisfy the failing-first requirement by writing each test body with `Assert.Fail("not implemented")` as a placeholder, confirming it fails, then replacing the placeholder with real assertions. Pre-merge and pure-chore sections with no spec scenarios and no new production behavior are exempt from the failing-test-first requirement.
  Do not test `internal` helpers directly — cover them through their public API callers (e.g. test DomainId.IsValid via TryParse, not by calling IsValid directly).
  Register every new project in Trakmark.slnx.
  One type per file — never define multiple top-level types in the same .cs file; the file name must match the type name.
  Code style: types are `sealed` by default (unseal only when inheritance is designed for); use `sealed record` only when the type is a pure data carrier with no validation logic and no custom equality semantics — domain value objects that enforce invariants must be `sealed class` and implement IEquatable<T> with Equals/GetHashCode overrides and == / != operator overloads; all public constructor and method parameters that accept reference types must be validated with ArgumentNullException.ThrowIfNull as the first line (except DI-injected deps); when Equals uses a specific StringComparison, GetHashCode must use the same comparer; XML `<summary>` docs on all public/internal types and members (constructors, methods, properties, non-trivial fields, and consts); exceptions: [LoggerMessage] methods, EF migrations, and test methods ([Fact]/[Theory]) — the test method name is the specification; always use braces for control statements (if, else, for, foreach, while, do) — even single-line bodies.
  Null-left operator tests: when writing `Assert.False(null == x)` assertions, skip `readonly record struct` types — the compiler rejects a typed null operand for a value type and the null-guard branch is unreachable. Only reference-type value objects (sealed class) need null-left coverage.
  We use conventional commits and U.S. English in all prose and docs.

rules:
  tasks:
    - "After implementing each public/internal type, verify every public constructor and method: every reference-type parameter must have `ArgumentNullException.ThrowIfNull` as its first line (except DI-injected deps). Do this before marking the task done."
    - Every type that implements IEquatable<T> must also expose == and != operator overloads. Check this before marking the task done.
    - "When writing a task that targets an internal method or property, do not suggest a new test file. Instead, instruct the agent to test via the public API caller (e.g. 'cover via TryParse' rather than 'test IsValid directly or in a new file')."
    - "When implementing tests for a type that returns a discriminated union or named result subtypes (e.g. Success, NotFound, Conflict, Duplicate), list all subtypes in a comment before writing the first test and ensure each subtype has at least one test case before marking the task done."
  ui_testing:
    - "Use bUnit + xUnit in a `Trakmark.Tests` project for all Blazor component tests. Do not use Playwright or Cypress for component-level UI work — they require a running app, cannot mock services via NSubstitute, and make auth simulation difficult. bUnit covers all component-level concerns: role-restricted rendering, form validation/state, service wiring, and navigation."
    - "Simulate authentication in bUnit via `TestAuthorizationContext` (from the `bunit.web` package). Do not spin up a real auth server for component tests."
    - "The service layer is covered by integration tests (Testcontainers). bUnit tests should mock the service boundary via NSubstitute — do not re-prove database behavior through the UI test."
    - "Playwright may be introduced later as a separate smoke-test layer for true E2E coverage (login flow, full stack). That is a separate concern from component testing and should not be mixed into the same project."
    - "Before committing a Blazor form component, verify that every maxlength, min, and max attribute on input elements matches the corresponding domain constraint exactly — look up the domain type's constant or constructor guard, not memory. Off-by-one errors here are invisible until review."
  pre_merge:
    - "Run dotnet clean then dotnet build on Trakmark.slnx and resolve all SonarQube warnings (filter: 'warning S\\d+', exclude 'Microsoft.Common' lines). Attempt fix or justified suppression in up to 3 rounds. If warnings remain after 3 rounds, block the merge and append the outstanding items (branch, date, warning list, reason unresolved) to docs/sonarqube-warnings-triage.md."
    - "Trakmark.Domain line coverage must be 100% before merge, but only for changes whose diff touches Trakmark.Domain. Run the coverage-report skill (or its Run-Coverage.ps1) and fix any gap by adding tests — domain types have no untestable infrastructure dependencies, so any uncovered line is a missing test, not an exemption. Sections that do not modify Trakmark.Domain (persistence, application-layer, UI-only) are exempt — verify by checking the diff."
