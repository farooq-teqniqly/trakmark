schema: spec-driven

context: |
  Tech stack: .NET 10, C#, Blazor Web App (Interactive Server, per-page), EF Core + SQL Server, ASP.NET Core Identity (Google OAuth).
  Project naming: one project per layer/concern, prefixed `Trakmark.<Area>` (e.g. Trakmark.Domain); the web app project is `Trakmark`.
  Tests: each project's unit tests live in a sibling project `<Project>.Tests` (e.g. Trakmark.Domain.Tests) using xUnit (NSubstitute for mocking), referencing the project under test.
  Test style: one test class per production type, one file per test class — never group multiple unrelated types in a single test file. Name test methods using the Roy Osherove convention: Subject_Scenario_ExpectedResult with all three segments in PascalCase (e.g. AddAppAuthentication_GoogleCredentialsMissing_ThrowsInvalidOperationException); never use lowercase words within a segment; the Subject segment must name the observable public entry point (public method, endpoint, or property under test), not a private or internal helper — even if the test reaches the helper indirectly. Each test has // Arrange, // Act, // Assert comments; when all phases collapse to a single expression or lambda (e.g. Assert.Throws<>(...) or a one-liner assertion on an [InlineData]-driven value), combine them as // Arrange / Act / Assert or // Act / Assert on a single line — do not artificially split; never annotate AAA markers with inline notes (e.g. // Assert — some explanation), use the plain marker only; this extends to the line immediately following the marker — do not place an explanatory comment beneath it (e.g. // Arrange followed by // (setup in constructor)); if the constructor provides full setup, write // Arrange alone. Do not add section-divider comments (e.g. // ── Some heading ───) inside test classes — if a divider seems necessary, the test method names are not descriptive enough; rename them instead. Prefer data-driven tests (Theory/InlineData/MemberData) over many near-duplicate Facts; once a Theory covers a case do not also write a Fact for the same scenario — it is redundant and will diverge; test behavior not implementation (assert observable outcomes, not internal calls) so tests aren't brittle. Integration/end-to-end tests prefer the real database via Testcontainers over in-memory fakes.
  TDD: each `#### Scenario:` in a spec maps to a test case; write the failing tests from a spec's scenarios first, then implement to green. For test-only changes (adding tests against already-complete production code), satisfy the failing-first requirement by writing each test body with `Assert.Fail("not implemented")` as a placeholder, confirming it fails, then replacing the placeholder with real assertions. Pre-merge and pure-chore sections with no spec scenarios and no new production behavior are exempt from the failing-test-first requirement.
  Do not test `internal` helpers directly — cover them through their public API callers (e.g. test DomainId.IsValid via TryParse, not by calling IsValid directly).
  Register every new project in Trakmark.slnx.
  One type per file — never define multiple top-level types in the same .cs file; the file name must match the type name.
  Code style: types are `sealed` by default (unseal only when inheritance is designed for); use `sealed record` only when the type is a pure data carrier with no validation logic and no custom equality semantics — domain value objects that enforce invariants must be `sealed class` and implement IEquatable<T> with Equals/GetHashCode overrides and == / != operator overloads; all public constructor and method parameters that accept reference types must be validated with ArgumentNullException.ThrowIfNull as the first line (except DI-injected deps); when Equals uses a specific StringComparison, GetHashCode must use the same comparer; XML `<summary>` docs on all public/internal types and members (constructors, methods, properties, non-trivial fields, and consts); exceptions: [LoggerMessage] methods, EF migrations, and test methods ([Fact]/[Theory]) — the test method name is the specification; for overrides, `/// <inheritdoc/>` alone satisfies the <summary> requirement — never place an explicit <summary> block alongside <inheritdoc/> on the same member; always use braces for control statements (if, else, for, foreach, while, do) — even single-line bodies.
  Null-left operator tests: when writing `Assert.False(null == x)` assertions, skip `readonly record struct` types — the compiler rejects a typed null operand for a value type and the null-guard branch is unreachable. Only reference-type value objects (sealed class) need null-left coverage.
  We use conventional commits and U.S. English in all prose and docs.

rules:
  tasks:
    - "After implementing each public/internal type, verify every public constructor and method: every reference-type parameter must have `ArgumentNullException.ThrowIfNull` as its first line (except DI-injected deps). Do this before marking the task done."
    - "Never negate the condition of an if that has an else branch (SonarQube S1940 in C#, S7735 in JS/TS). Invert the condition and swap the branches so the positive case leads: `if (x) { ... } else { ... }` not `if (!x) { ... } else { ... }`. Apply this in both C# and JavaScript/TypeScript."
    - "Keep constructor and method parameter counts at 7 or below (SonarQube S107). When a signature would exceed this, introduce a parameter object — a `sealed record` (or `internal sealed record`) that groups the related parameters — rather than reordering or splitting arbitrarily. The grouping must reflect a genuine domain concept."
    - Every type that implements IEquatable<T> must also expose == and != operator overloads. Check this before marking the task done.
    - "When writing a task that targets an internal method or property, do not suggest a new test file. Instead, instruct the agent to test via the public API caller (e.g. 'cover via TryParse' rather than 'test IsValid directly or in a new file')."
    - "When implementing tests for a type that returns a discriminated union or named result subtypes (e.g. Success, NotFound, Conflict, Duplicate), list all subtypes in a comment before writing the first test and ensure each subtype has at least one test case before marking the task done."
    - "Prefer Assert.Null/Assert.NotNull over Assert.False(x == null)/Assert.True(x != null) (xUnit2024). Exception: when a test must cover a custom operator== null branch (e.g. `left?.Equals(right) ?? right is null`), use a typed null variable (`TypeName? nullFoo = null;`) in the comparison instead of the literal null — this invokes the operator without triggering xUnit2024."
    - "Prefer C# pattern matching over boolean expressions: use `x is val1 or val2` (or relational patterns like `x is 0 or > 100`) instead of `x == val1 || x == val2` for constant/relational checks on a single variable; use `obj is T { Prop: val1 or val2 }` property patterns instead of `obj is T t && (t.Prop == val1 || t.Prop == val2)`. Apply this wherever the intent is matching a value or inspecting a property on a matched type."
    - "In IEntityTypeConfiguration<T>, always call .ValueGeneratedNever() on any PK that is domain-assigned (set by a factory such as Entity.Create()). EF Core defaults to ValueGeneratedOnAdd() for string PKs, which conflicts with domain-controlled identity."
    - "Do not call .IsRequired() on non-nullable string properties in IEntityTypeConfiguration<T>. With Nullable enabled, EF Core 10 infers IS NOT NULL from the C# nullable annotation — the call is redundant noise."
    - "Domain tables must not define FK constraints to ASP.NET Core Identity schema tables (AspNetUsers, AspNetRoles, etc.). Reference Identity PKs by value (e.g. an AccountId string column) but omit HasForeignKey/HasOne/HasMany calls targeting Identity tables. Identity schema evolves independently; coupling via FK violates domain/infrastructure decoupling. If a future task intentionally adds such a constraint, record the rationale in design.md as a named decision."
    - "When test code must call the synchronous EF Core save path intentionally (e.g. `context.SaveChanges()` to exercise a SavingChanges interceptor override), add `#pragma warning disable S6966` / `#pragma warning restore S6966` around that call before staging — S6966 fires on any non-awaited EF save call and must be suppressed in the same commit that introduces the test, not applied after merge."
    - "Every catch block that suppresses or transforms an exception (does not re-throw it) must have at least one dedicated test case exercising that code path — including idempotent-success paths that catch DbUpdateException and return a success result."
    - "Do not assert a property value that a query predicate already guarantees — e.g. Assert.Equal(id, entity.AccountId) immediately after SingleAsync(e => e.AccountId == id) is logically redundant. Assert only values that were not part of the retrieval predicate."
    - "Never use ! (null-forgiving) on reflection results (e.g. Assembly.GetType(string)!, typeof(T).GetMethod(name)!). Use ?? throw new InvalidOperationException(...) instead — reflection lookups return null at runtime when the target is absent, and ! silences a real safety gap."
    - "Every catch block that suppresses or re-routes an exception (rather than re-throwing it) must emit at least one log entry via a [LoggerMessage]-generated method at Warning level or above. A silent catch hides failure paths from observability tooling."
    - "Do not write trivially-true assertions: an assertion is circular when the outcome is guaranteed by construction or type invariants — e.g. Assert.True(MyId.TryParse(myId.Value, out _)) always passes because myId.Value came from a valid MyId. Assert only claims the test actually exercises."
    - "For every ArgumentNullException.ThrowIfNull or ArgumentException.ThrowIfNullOrEmpty guard in a public or internal constructor or method, write at least one test case that passes null (or empty string) and asserts the expected exception."
    - "When an EF Core interceptor overrides both SavingChangesAsync and SavingChanges, every test scenario written for the async path must have a corresponding test on the sync path — and vice versa. A scenario tested only on one side of the async/sync pair leaves the other branch untested."
    - "Unit tests that exercise EF Core interceptors require the Microsoft.EntityFrameworkCore.InMemory package in the test project's .csproj. Add it with `dotnet add package Microsoft.EntityFrameworkCore.InMemory` before writing interceptor unit tests and commit the .csproj change in the same worktree branch as the tests."
  ui_testing:
    - "Use bUnit + xUnit in a `Trakmark.Tests` project for all Blazor component tests. Do not use Playwright or Cypress for component-level UI work — they require a running app, cannot mock services via NSubstitute, and make auth simulation difficult. bUnit covers all component-level concerns: role-restricted rendering, form validation/state, service wiring, and navigation."
    - "Simulate authentication in bUnit via `TestAuthorizationContext` (from the `bunit.web` package). Do not spin up a real auth server for component tests."
    - "The service layer is covered by integration tests (Testcontainers). bUnit tests should mock the service boundary via NSubstitute — do not re-prove database behavior through the UI test."
    - "Playwright may be introduced later as a separate smoke-test layer for true E2E coverage (login flow, full stack). That is a separate concern from component testing and should not be mixed into the same project."
    - "Before committing a Blazor form component, verify that every maxlength, min, and max attribute on input elements matches the corresponding domain constraint exactly — look up the domain type's constant or constructor guard, not memory. Off-by-one errors here are invisible until review."
    - "Every InteractiveServer or InteractiveAuto component with a side-effectful OnInitializedAsync must add `if (!RendererInfo.IsInteractive) return;` as the first line — prevents redundant DB calls during SSR prerender."
    - "Any OnInitializedAsync that calls a service which may throw must wrap the call in a broad `catch (Exception ex)`, emit a [LoggerMessage] entry at Warning level or above, and set a user-visible error field. Prefer catch (Exception ex) over a narrow exception-type filter so unexpected types do not bypass the error display."
    - "When adding an async-guarded submit button (e.g. a _isSaving flag), call StateHasChanged() immediately after setting _isSaving = true — Blazor Server does not re-render at intermediate await points, so without it the button never visually disables."
  pre_merge:
    - "Run dotnet clean then dotnet build on Trakmark.slnx and resolve all SonarQube warnings (filter: 'warning S\\d+', exclude 'Microsoft.Common' lines). Attempt fix or justified suppression in up to 3 rounds. If warnings remain after 3 rounds, block the merge and append the outstanding items (branch, date, warning list, reason unresolved) to docs/sonarqube-warnings-triage.md."
    - "Trakmark.Domain line coverage must be 100% before merge, but only for changes whose diff touches Trakmark.Domain. Run the coverage-report skill (or its Run-Coverage.ps1) and fix any gap by adding tests — domain types have no untestable infrastructure dependencies, so any uncovered line is a missing test, not an exemption. Sections that do not modify Trakmark.Domain (persistence, application-layer, UI-only) are exempt — verify by checking the diff."
